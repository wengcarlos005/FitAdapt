<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b0f14" />
  <title>FitAdapt — Treino Personalizado</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitAdapt" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Moldura de celular para simular o app dentro do site -->
  <div class="device-frame">
    <div class="device-notch"></div>
    <main id="app" class="app-screen"><!-- as telas são renderizadas aqui --></main>
    <nav id="tabbar" class="tabbar" hidden>
      <button class="tab" data-route="home">
        <span class="tab-ico">🏠</span><span class="tab-label">Início</span>
      </button>
      <button class="tab" data-route="plan">
        <span class="tab-ico">📋</span><span class="tab-label">Ficha</span>
      </button>
      <button class="tab" data-route="progress">
        <span class="tab-ico">📈</span><span class="tab-label">Progresso</span>
      </button>
      <button class="tab" data-route="profile">
        <span class="tab-ico">👤</span><span class="tab-label">Perfil</span>
      </button>
    </nav>
  </div>

  <script src="data/equipment.js"></script>
  <script src="data/exercises.js"></script>
  <script src="data/exercise_media.js"></script>
  <script src="data/achievements.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/store.js"></script>
  <script src="js/algorithm.js"></script>
  <script src="js/onboarding.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>

  <!-- Registro do Service Worker (offline / instalável) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW falhou:', err));
      });
    }
  </script>
</body>
</html>
