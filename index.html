<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>FitAdapt — Treino Personalizado</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitAdapt" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=9" />
</head>
<body>
  <div class="app-shell">
    <main id="app" class="app-screen"><!-- as telas são renderizadas aqui --></main>
    <nav id="tabbar" class="tabbar" hidden>
      <button class="tab" data-route="home">
        <span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/><path d="M9.5 20v-5h5v5"/></svg></span><span class="tab-label">Início</span>
      </button>
      <button class="tab" data-route="plan">
        <span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4.5V3.5h6v1M9 10h6M9 14h4"/></svg></span><span class="tab-label">Ficha</span>
      </button>
      <button class="tab" data-route="progress">
        <span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16"/><path d="M8 15l3-4 3 2 4-6"/></svg></span><span class="tab-label">Progresso</span>
      </button>
      <button class="tab" data-route="profile">
        <span class="tab-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></span><span class="tab-label">Perfil</span>
      </button>
    </nav>
  </div>

  <script src="data/equipment.js?v=9"></script>
  <script src="data/exercises.js?v=9"></script>
  <script src="data/exercise_media.js?v=9"></script>
  <script src="data/achievements.js?v=9"></script>
  <script src="js/icons.js?v=9"></script>
  <script src="js/store.js?v=9"></script>
  <script src="js/auth.js?v=9"></script>
  <script src="js/algorithm.js?v=9"></script>
  <script src="js/onboarding.js?v=9"></script>
  <script src="js/player.js?v=9"></script>
  <script src="js/app.js?v=9"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW falhou:', err));
      });
    }
  </script>
</body>
</html>
